<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <title>{{ title }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @media print { .no-print { display: none; } }
    </style>
</head>
<body class="p-8 bg-gray-100">
    <div class="max-w-5xl mx-auto bg-white p-6 rounded shadow">
        <div class="flex justify-between items-center mb-6 no-print">
            <h1 class="text-2xl font-bold">{{ title }}</h1>
            <button onclick="window.print()" class="px-3 py-1 bg-gray-500 text-white rounded text-sm">Imprimir PDF</button>
        </div>
        <form method="get" class="mb-4 flex gap-2 no-print">
            <input type="date" name="desde" value="{{ fecha_desde }}" class="border rounded px-2 py-1 text-sm">
            <input type="date" name="hasta" value="{{ fecha_hasta }}" class="border rounded px-2 py-1 text-sm">
            <button type="submit" class="px-3 py-1 bg-blue-500 text-white rounded text-sm">Filtrar</button>
        </form>
        <table class="w-full text-sm border-collapse">
            <thead>
                <tr class="bg-gray-200">
                    <th class="p-2 text-left">Proveedor</th>
                    <th class="p-2 text-right">Productos distintos</th>
                    <th class="p-2 text-right">Cantidad total</th>
                </tr>
            </thead>
            <tbody>
                {% for p in pedidos %}
                <tr class="border-b">
                    <td class="p-2 font-semibold">{{ p.producto__proveedor__nombre }}</td>
                    <td class="p-2 text-right">{{ p.total_productos }}</td>
                    <td class="p-2 text-right">{{ p.cantidad_total|floatformat:0 }}</td>
                </tr>
                {% empty %}
                <tr><td colspan="3" class="p-4 text-center text-gray-500">No hay ventas en el período seleccionado</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
